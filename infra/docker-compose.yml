name: mappo

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mappo
      POSTGRES_USER: mappo
      POSTGRES_PASSWORD: mappo
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mappo -d mappo"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data-mappo:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    image: flyway/flyway:10
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend/src/main/resources/db/migration:/flyway/sql
    command:
      - -url=jdbc:postgresql://postgres:5432/mappo
      - -user=mappo
      - -password=mappo
      - -connectRetries=20
      - -locations=filesystem:/flyway/sql
      - migrate

  backend:
    image: maven:3.9.9-eclipse-temurin-21
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    working_dir: /workspace
    environment:
      MAPPO_JDBC_DATABASE_URL: ${MAPPO_JDBC_DATABASE_URL:-jdbc:postgresql://postgres:5432/mappo}
      MAPPO_DB_USER: ${MAPPO_DB_USER:-mappo}
      MAPPO_DB_PASSWORD: ${MAPPO_DB_PASSWORD:-mappo}
      MAPPO_REDIS_ENABLED: ${MAPPO_REDIS_ENABLED:-true}
      MAPPO_REDIS_HOST: ${MAPPO_REDIS_HOST:-redis}
      MAPPO_REDIS_PORT: ${MAPPO_REDIS_PORT:-6379}
      MAPPO_REDIS_PASSWORD: ${MAPPO_REDIS_PASSWORD:-}
      MAPPO_REDIS_SSL_ENABLED: ${MAPPO_REDIS_SSL_ENABLED:-false}
      MAPPO_AZURE_TENANT_ID: ${MAPPO_AZURE_TENANT_ID:-}
      MAPPO_AZURE_CLIENT_ID: ${MAPPO_AZURE_CLIENT_ID:-}
      MAPPO_AZURE_CLIENT_SECRET: ${MAPPO_AZURE_CLIENT_SECRET:-}
    volumes:
      - ..:/workspace
    command:
      - bash
      - -lc
      - |
        ./mvnw -pl backend spring-boot:run
    ports:
      - "8010:8010"

  frontend:
    image: node:20-alpine
    depends_on:
      - backend
    working_dir: /workspace/frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8010
    volumes:
      - ..:/workspace
    command:
      - sh
      - -c
      - npm install && npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5174:5173"

volumes:
  postgres-data-mappo:
