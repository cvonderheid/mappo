name: mappo

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mappo
      POSTGRES_USER: mappo
      POSTGRES_PASSWORD: mappo
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mappo -d mappo"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data-mappo:/var/lib/postgresql/data

  migrate:
    image: flyway/flyway:10
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend/flyway/sql:/flyway/sql
    command:
      - -url=jdbc:postgresql://postgres:5432/mappo
      - -user=mappo
      - -password=mappo
      - -connectRetries=20
      - -locations=filesystem:/flyway/sql
      - migrate

  backend:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    working_dir: /workspace
    environment:
      MAPPO_DATABASE_URL: ${MAPPO_DATABASE_URL:-postgresql+psycopg://mappo:mappo@postgres:5432/mappo}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://mappo:mappo@postgres:5432/mappo}
      MAPPO_RETENTION_DAYS: "90"
      MAPPO_EXECUTION_MODE: ${MAPPO_EXECUTION_MODE:-azure}
      MAPPO_AZURE_TENANT_ID: ${MAPPO_AZURE_TENANT_ID:-}
      MAPPO_AZURE_CLIENT_ID: ${MAPPO_AZURE_CLIENT_ID:-}
      MAPPO_AZURE_CLIENT_SECRET: ${MAPPO_AZURE_CLIENT_SECRET:-}
    volumes:
      - ..:/workspace
    command:
      - bash
      - -lc
      - |
        if [ -f /workspace/.data/mappo-azure.env ]; then
          source /workspace/.data/mappo-azure.env
        fi
        if [ -f /workspace/.data/mappo-db.env ]; then
          source /workspace/.data/mappo-db.env
        fi
        uv sync --all-packages --all-groups && uv --directory backend run --package mappo-backend -- uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8010:8000"

  frontend:
    image: node:20-alpine
    depends_on:
      - backend
    working_dir: /workspace/frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8010
    volumes:
      - ..:/workspace
    command:
      - sh
      - -c
      - npm install && npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5174:5173"

volumes:
  postgres-data-mappo:
