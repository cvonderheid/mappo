# Platform stack example:
#   cd infra/pulumi
#   pulumi stack init <platform-stack>
#   pulumi config set mappo:stackKind platform
#   pulumi config set mappo:runtimeSubscriptionId <subscription-id>
#   pulumi config set mappo:runtimeLocation <azure-region>
#
# Runtime stack example:
#   cd infra/pulumi
#   pulumi stack init <runtime-stack>
#   pulumi config set mappo:stackKind runtime
#   pulumi config set mappo:platformStack <platform-stack-reference>
#   pulumi config set mappo:imageTag <published-image-tag>
#
# Pulumi generates the DB admin password for fresh platform stacks.
config:
  mappo:defaultLocation: eastus
  mappo:stackKind: platform
  mappo:runtimeLocation: centralus
  mappo:controlPlanePostgresEnabled: "true"
