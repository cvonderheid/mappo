spring:
  application:
    name: mappo-control-plane
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration
  datasource:
    url: ${MAPPO_JDBC_DATABASE_URL:jdbc:postgresql://localhost:5433/mappo}
    username: ${MAPPO_DB_USER:mappo}
    password: ${MAPPO_DB_PASSWORD:mappo}
    hikari:
      pool-name: ${MAPPO_DB_POOL_NAME:mappo-hikari}
      maximum-pool-size: ${MAPPO_DB_POOL_MAX_SIZE:8}
      minimum-idle: ${MAPPO_DB_POOL_MIN_IDLE:2}
      connection-timeout: ${MAPPO_DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${MAPPO_DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${MAPPO_DB_POOL_MAX_LIFETIME_MS:1800000}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  jooq:
    sql-dialect: POSTGRES
  data:
    redis:
      repositories:
        enabled: false
      host: ${MAPPO_REDIS_HOST:localhost}
      port: ${MAPPO_REDIS_PORT:6379}
      password: ${MAPPO_REDIS_PASSWORD:}
      ssl:
        enabled: ${MAPPO_REDIS_SSL_ENABLED:false}
      timeout: ${MAPPO_REDIS_TIMEOUT:5s}

springdoc:
  api-docs:
    enabled: true
    path: ${mappo.api-prefix}/openapi.json
  swagger-ui:
    enabled: false

logging:
  level:
    org.jooq.Constants: OFF
    org.jooq.impl.DefaultExecuteContext.logVersionSupport: ERROR

server:
  port: ${MAPPO_BACKEND_PORT:8010}

mappo:
  app-version: ${MAPPO_APP_VERSION:0.1.0-java}
  api-prefix: /api/v1
  marketplace-ingest-token: ${MAPPO_MARKETPLACE_INGEST_TOKEN:}
  cors-origins: ${MAPPO_CORS_ORIGINS:http://localhost:5174,http://127.0.0.1:5174}
  azure:
    tenant-id: ${MAPPO_AZURE_TENANT_ID:}
    client-id: ${MAPPO_AZURE_CLIENT_ID:}
    client-secret: ${MAPPO_AZURE_CLIENT_SECRET:}
    deployment-stack-attach-timeout-ms: ${MAPPO_AZURE_DEPLOYMENT_STACK_ATTACH_TIMEOUT_MS:120000}
    deployment-stack-attach-poll-interval-ms: ${MAPPO_AZURE_DEPLOYMENT_STACK_ATTACH_POLL_INTERVAL_MS:2000}
  managed-app-release:
    repo: ${MAPPO_MANAGED_APP_RELEASE_REPO:cvonderheid/mappo-managed-app}
    path: ${MAPPO_MANAGED_APP_RELEASE_PATH:releases/releases.manifest.json}
    ref: ${MAPPO_MANAGED_APP_RELEASE_REF:main}
    webhook-secret: ${MAPPO_MANAGED_APP_RELEASE_WEBHOOK_SECRET:}
    github-token: ${MAPPO_MANAGED_APP_RELEASE_GITHUB_TOKEN:}
  publisher-acr:
    server: ${MAPPO_PUBLISHER_ACR_SERVER:}
    pull-client-id: ${MAPPO_PUBLISHER_ACR_PULL_CLIENT_ID:}
    pull-client-secret: ${MAPPO_PUBLISHER_ACR_PULL_CLIENT_SECRET:}
    pull-secret-name: ${MAPPO_PUBLISHER_ACR_PULL_SECRET_NAME:publisher-acr-pull}
  azure-devops:
    base-url: ${MAPPO_AZURE_DEVOPS_BASE_URL:https://dev.azure.com}
    personal-access-token: ${MAPPO_AZURE_DEVOPS_PERSONAL_ACCESS_TOKEN:}
    api-version: ${MAPPO_AZURE_DEVOPS_API_VERSION:7.1}
    connect-timeout-ms: ${MAPPO_AZURE_DEVOPS_CONNECT_TIMEOUT_MS:10000}
    read-timeout-ms: ${MAPPO_AZURE_DEVOPS_READ_TIMEOUT_MS:30000}
  runtime-probe:
    enabled: ${MAPPO_RUNTIME_PROBE_ENABLED:true}
    interval-ms: ${MAPPO_RUNTIME_PROBE_INTERVAL_MS:60000}
    initial-delay-ms: ${MAPPO_RUNTIME_PROBE_INITIAL_DELAY_MS:15000}
    timeout-ms: ${MAPPO_RUNTIME_PROBE_TIMEOUT_MS:5000}
  sse:
    enabled: ${MAPPO_SSE_ENABLED:true}
    heartbeat-interval-ms: ${MAPPO_SSE_HEARTBEAT_INTERVAL_MS:15000}
    coalesce-window-ms: ${MAPPO_SSE_COALESCE_WINDOW_MS:250}
  retention:
    enabled: ${MAPPO_RETENTION_ENABLED:true}
    interval-ms: ${MAPPO_RETENTION_INTERVAL_MS:86400000}
    run-retention-days: ${MAPPO_RUN_RETENTION_DAYS:30}
    audit-retention-days: ${MAPPO_AUDIT_RETENTION_DAYS:30}
  redis:
    enabled: ${MAPPO_REDIS_ENABLED:false}
    queue-key: ${MAPPO_REDIS_QUEUE_KEY:mappo:run-queue}
    queue-lock-prefix: ${MAPPO_REDIS_QUEUE_LOCK_PREFIX:mappo:run-lock:}
    queue-dedup-prefix: ${MAPPO_REDIS_QUEUE_DEDUP_PREFIX:mappo:run-dedup:}
    lock-lease-ms: ${MAPPO_REDIS_LOCK_LEASE_MS:3600000}
    queue-dedup-ttl-ms: ${MAPPO_REDIS_QUEUE_DEDUP_TTL_MS:120000}
    worker-poll-timeout-ms: ${MAPPO_REDIS_WORKER_POLL_TIMEOUT_MS:1000}
    heartbeat-interval-ms: ${MAPPO_REDIS_HEARTBEAT_INTERVAL_MS:10000}
    recovery-interval-ms: ${MAPPO_REDIS_RECOVERY_INTERVAL_MS:30000}
    recovery-stale-after-ms: ${MAPPO_REDIS_RECOVERY_STALE_AFTER_MS:120000}
