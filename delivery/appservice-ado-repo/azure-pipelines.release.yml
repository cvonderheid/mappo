trigger:
  branches:
    include:
      - main
  paths:
    include:
      - app/release.json

pr: none

pool:
  vmImage: ubuntu-latest

steps:
  - bash: |
      set -euo pipefail
      version="$(jq -r '.version' app/release.json)"
      data_model_version="$(jq -r '.dataModelVersion' app/release.json)"

      if [[ -z "${version}" || "${version}" == "null" ]]; then
        echo "release.json is missing version" >&2
        exit 1
      fi

      echo "##vso[build.updatebuildnumber]${version}"
      echo "MAPPO App Service release is ready."
      echo "version=${version}"
      echo "dataModelVersion=${data_model_version}"
    displayName: Mark release ready
