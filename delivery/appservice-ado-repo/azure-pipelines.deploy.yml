trigger: none
pr: none

parameters:
  - name: targetSubscriptionId
    type: string
    default: ''
  - name: targetResourceGroup
    type: string
    default: ''
  - name: targetAppName
    type: string
    default: ''
  - name: targetId
    type: string
    default: ''
  - name: appVersion
    type: string
    default: '0.0.0-dev'
  - name: dataModelVersion
    type: string
    default: '0'
  - name: deployedBy
    type: string
    default: 'ado-pipeline'

pool:
  vmImage: ubuntu-latest

steps:
  - task: ArchiveFiles@2
    displayName: Archive demo app
    inputs:
      rootFolderOrFile: app
      includeRootFolder: false
      archiveType: zip
      archiveFile: '$(Pipeline.Workspace)/appservice-demo.zip'
      replaceExistingArchive: true

  - task: AzureCLI@2
    displayName: Deploy App Service target
    inputs:
      azureSubscription: mappo-ado-demo-rg-contributor
      scriptType: bash
      scriptLocation: inlineScript
      addSpnToEnvironment: true
      inlineScript: |
        set -euo pipefail

        az account set --subscription '${{ parameters.targetSubscriptionId }}'

        az webapp deploy \
          --resource-group '${{ parameters.targetResourceGroup }}' \
          --name '${{ parameters.targetAppName }}' \
          --src-path '$(Pipeline.Workspace)/appservice-demo.zip' \
          --type zip \
          --restart true

        az webapp config appsettings set \
          --resource-group '${{ parameters.targetResourceGroup }}' \
          --name '${{ parameters.targetAppName }}' \
          --settings \
            APP_VERSION='${{ parameters.appVersion }}' \
            DATA_MODEL_VERSION='${{ parameters.dataModelVersion }}' \
            MAPPO_TARGET_ID='${{ parameters.targetId }}' \
            DEPLOYED_BY='${{ parameters.deployedBy }}'

        az webapp restart \
          --resource-group '${{ parameters.targetResourceGroup }}' \
          --name '${{ parameters.targetAppName }}'

        curl --fail --retry 12 --retry-delay 5 --retry-all-errors \
          "https://${{ parameters.targetAppName }}.azurewebsites.net/version"

        curl --fail --retry 12 --retry-delay 5 --retry-all-errors \
          "https://${{ parameters.targetAppName }}.azurewebsites.net/health"
